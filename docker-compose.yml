services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: orion
      POSTGRES_DB: orion
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: orion-genai-pipeline:latest
    environment:
      MINIO_URL: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: bronze
      MINIO_SECURE: "false"
      POSTGRES_URL: postgresql://orion:orion@postgres:5432/orion
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: document_embeddings
      DATA_SOURCE_DIR: /app/pdfs
      DATA_SOURCE_EXTENSIONS: .txt,.md,.pdf
      LOCAL_OUTPUT_DIR: /app/data/local
      PDF_EXTRACTOR: pymupdf
      PDF_EXTRACTION_MODE: structured
      PDF_OCR_ENABLED: "true"
      PDF_MANIFEST_PATH: /app/pdfs/manifest.yaml
      PDF_DOWNLOAD_DIR: /app/pdfs
      EMBEDDING_MODEL: BAAI/bge-m3
      EMBEDDING_DEVICE: cpu
      EMBEDDING_BATCH_SIZE: "16"
      TESSERACT_CMD: /usr/bin/tesseract
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
    volumes:
      - ./pdfs:/app/pdfs:ro
      - ./data:/app/data
      - huggingface_cache:/app/.cache/huggingface
    depends_on:
      minio:
        condition: service_started
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    profiles:
      - pipeline

  pipeline-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: orion-genai-pipeline:latest
    command: ["serve"]
    ports:
      - "8000:8000"
    environment:
      MINIO_URL: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: bronze
      MINIO_SECURE: "false"
      POSTGRES_URL: postgresql://orion:orion@postgres:5432/orion
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: document_embeddings
      DATA_SOURCE_DIR: /app/pdfs
      DATA_SOURCE_EXTENSIONS: .txt,.md,.pdf
      LOCAL_OUTPUT_DIR: /app/data/local
      PDF_EXTRACTOR: pymupdf
      PDF_EXTRACTION_MODE: structured
      PDF_OCR_ENABLED: "true"
      PDF_MANIFEST_PATH: /app/pdfs/manifest.yaml
      PDF_DOWNLOAD_DIR: /app/pdfs
      SITE_MANIFEST_PATH: /app/sites/manifest.yaml
      EMBEDDING_MODEL: BAAI/bge-m3
      EMBEDDING_DEVICE: cpu
      EMBEDDING_BATCH_SIZE: "16"
      TESSERACT_CMD: /usr/bin/tesseract
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
      PIPELINE_API_URL: http://pipeline-api:8000/api
      ALLOW_OPTIONAL_CORPUS: "false"
      CORPUS_STRICT_HASH: "true"
      PDF_MAX_UPLOAD_BYTES: "83886080"
      ALLOWED_SITE_DOMAINS: docs.aws.amazon.com,aws.amazon.com
      JOB_TTL_SECONDS: "86400"
    volumes:
      - ./pdfs:/app/pdfs:ro
      - ./sites:/app/sites:ro
      - ./data:/app/data
      - huggingface_cache:/app/.cache/huggingface
    depends_on:
      minio:
        condition: service_started
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  geracao:
    build:
      context: .
      dockerfile: Dockerfile.geracao
    environment:
      PIPELINE_API_URL: http://pipeline-api:8000/api
      GERACAO_POLL_INTERVAL_SECONDS: "5"
      GERACAO_JOB_TIMEOUT_SECONDS: "3600"
      GERACAO_SITE_URLS: ""
    depends_on:
      pipeline-api:
        condition: service_healthy

volumes:
  minio_data:
  postgres_data:
  qdrant_data:
  huggingface_cache:
